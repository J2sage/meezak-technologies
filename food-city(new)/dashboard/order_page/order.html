<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food City</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="side-bar" id="sidebar">
    <button class="sidebar-close" type="button" aria-label="Close sidebar">
      <ion-icon name="close"></ion-icon>
    </button>
    <a href="../../Main_page/index.html"><img src="../../Main_page/assets/foodcity-logo.png" alt="Food City Logo" class="logo"></a>
    <ul>
      <li><a href="../index.html"><ion-icon name="menu"></ion-icon><span>Dashboard</span></a></li>
      <li><a href="../../Main_page/index.html"><ion-icon name="home"></ion-icon><span>Back to home</span></a></li>
      <li><a href="../../Menu_page/index.html"><ion-icon name="grid"></ion-icon><span>Menu</span></a></li>
      <li><a href="#orders" class="active"><ion-icon name="cart"></ion-icon><span>Orders</span></a></li>
      <li><a href="#profile"><ion-icon name="person"></ion-icon><span>Profile</span></a></li>
    </ul>
  </nav>
  
  <main>
    <div class="sidebar-overlay"></div>
    <section class="top">
      <button class="sidebar-toggle" type="button" aria-label="Toggle sidebar">
        <ion-icon name="menu"></ion-icon>
      </button>
      <div class="left">
        <p class="initials">J</p>
        <div class="user-info">
          <p class="full-name">Jibril Balogun</p>
          <p class="status">Customer</p>
        </div>
      </div>
      <button class="logout-btn">
        <ion-icon name="log-out"></ion-icon>
        Logout
      </button>
    </section>
    <section class="current">
      <div class="section-title">
        <h2><ion-icon name="cart"></ion-icon> Current Order</h2>

      </div>
      <div class="native-chart">
        <label for="file">Order Progress:</label>
        <progress id="file" max="100" value="50"></progress>
        <div class="timeline">
          <p class="completed">✅ Order Confirmed <span>07:25PM</span></p>
          <p class="completed">Packing <span>07:45PM</span></p>
          <p>🚗On the way <span>08:15PM</span></p>
          <p>🏠Here <span>08:45PM</span></p>
        </div>
      </div>

      <h3>ORDERS DETAILS</h3>
      <div class="details">
        <!-- <div class="cart-item">
          <div class="product-info">
            <img src="../../Menu_page/assets/foodcard1.webp" alt="${matchingProduct.name}">
            <div class="text">
              <p class="name">Fried Rice</p>
              <p class="stock">In stock</p>
            </div>
          </div>
          <p class="price">₦1,500</p>
          <div class="quantity">
            x2
          </div>
          <p class="total">₦3000</p>
        </div> -->

        
      </div>
    </section>

    

  </main>


  <script type="module" src="https://unpkg.com/ionicons@4.5.10-0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule="" src="https://unpkg.com/ionicons@4.5.10-0/dist/ionicons/ionicons.js"></script>
  <script src="../../login.js"></script>
  <script src="../dashboard.js" type="module" defer></script>
  <script src="../../Main_page/admin_page/admin-sidebar.js"></script>
</body>
</html>
