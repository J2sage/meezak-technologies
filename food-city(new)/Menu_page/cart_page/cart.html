<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart</title>
  <link rel="shortcut icon" href="../Main_page/icons/foodcityng_logo.jpg" sizes="532x32" type="image/x-icon">
  <link rel="stylesheet" href="cart.css">
  <link rel="stylesheet" href="responsiveneess.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <a href="../index.html"> <img src="../icons/arrow_back.png" alt="back arrow"> Continue Shopping</a>

    <div class="logo">
      <a href="../../Main_page/index.html"><img src="../assets/foodcity-logo.png" alt="Food City Logo"></a>
    </div>
  </header>

  <main >
    <h1 class="main_title">Your Cart</h1>
    <p class="main_text">Menu <span>></span> <span>Cart</span></p>
    <section class="container">
      <section class="cart-container">
        <div class="cart-container-head">
          <span class="product-head">Product</span>
          <span class="price-head">Price</span> 
          <span class="quantity-head">Quantity</span>
          <span class="total-head">Total</span>
          <span class="delete_btn"></span>
        </div>
        <div class="cart-body">
          
        </div>
        <button type="button" class="clear"><img src="icon/icon-remove-item.png" >CLEAR CART</button>
      </section>
      <section class="order">
        
      </section>
    </section>

    <section class="remove-container-backdrop">
      
    </section>
    <section class="remove-container">
      
    </section>
    
  </main>
  <script type="module" src="renderOrder.js"></script>

</html>
