<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="shortcut icon" href="../Main_page/icons/foodcityng_logo.jpg" sizes="532x32" type="image/x-icon">
  <link rel="stylesheet" href="contact.css">
  <link rel="stylesheet" href="../Main_page/footer.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="logo">
      <a href="../Main_page/index.html"><img src="../Main_page/assets/foodcity-logo.png" alt="Food City Logo"></a>
    </div>
  </header>
  <main>
    <section class="text">
      <h1>Contact Us</h1>
      <hr>
      <p>We would love to hear from you. Whether you have a question, need support, or want to explore opportunities to work together, feel free to raech out</p>
      <div class="card">
        <div class="icons"><ion-icon name="call" class="icon"></ion-icon></div>
        <div class="text-icon">
          <P class=".title"><b>Phone</b></P>
          <p>+(234) 811 700 0803</p>
        </div>
      </div>
      <div class="card">
        <div class="icons"><ion-icon name="mail" class="icon"></ion-icon></div>
        <div class="text-icon">
          <P class=".title"><b>Email</b></P>
          <p>info@foodcityng.com</p>
        </div>
      </div>

      <div class="card">
        <div class="icons"><ion-icon name="location" class="icon"></ion-icon></div>
        <div class="text-icon">
          <P class=".title"><b>Address</b></P>
          <p>9, Babatunde Oki St., Town planning way, Ilupeju.</p>
        </div>
      </div>

    </section>

    <section class="contact-form">
      <form action="">
        <div class="input-box">
          <label for="name">Name:</label>
          <input type="text" placeholder="Your name">
        </div>
        <div class="input-box">
          <label for="email">Email:</label>
          <input type="email" name="email" id="email" placeholder="Your email">
        </div>
        <div class="input-box">
          <label for="message">Message: </label>
          <textarea name="message" id="message" placeholder="Your message"></textarea>
        </div>
        <button>SUBMIT</button>
      </form>
    </section>
  </main>
  
  <script type="module" src="https://unpkg.com/ionicons@4.5.10-0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule="" src="https://unpkg.com/ionicons@4.5.10-0/dist/ionicons/ionicons.js"></script>
</body>
</html>
